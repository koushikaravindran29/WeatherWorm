<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> weather worm</title>
    <style>
body {
    font-family: Arial, sans-serif;
    text-align: center;
    margin: 0;
    background-color: #232323; 
    color: #ffffff;
    display: flex;
    flex-direction: column;
    align-items: center;
    height: 100vh;
}


.navbar {
    width: 100%;
    background-color: #232323;
   
    padding: 15px 20px;
    box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.2);
    position: fixed;
  
}

.navbar h1 {
    font-size: 30px;
    font-weight: bold;
    color: white; display: flex;
    align-items: center;
    justify-content: space-between;
    margin-left: 890px;
}

.navbar .menu {
    display: flex;
    gap: 15px;
}

.navbar .menu a {
    text-decoration: none;
    color: #ffffff;
    font-size: 16px;
    padding: 8px 12px;
    border-radius: 5px;
    transition: background 0.3s;
}

.navbar .menu a:hover {
    background-color: #474646;
}


.chat-container {
    width: 80%;
    max-width: 1500px;
    background: #232323;
    border-radius: 20px;
    box-shadow: 0px 4px 20px rgba(0, 0, 0, 0.2);
    display: flex;
    flex-direction: column;
    height: 85vh;
    overflow: hidden;
    margin-top: 130px; 
}

.chat-box {
    flex-grow: 1;
    overflow-y: auto;
    padding: 20px;
    border-bottom: 1px solid #474646;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
}


.input-container {
    display: flex;
    padding: 15px;
    background: #232323;
}

input {
    flex: 1;
    padding: 12px;
    border: none;
    border-radius: 10px;
    outline: none;
    background-color: #282929;
    color: white;
    font-size: 26px;
    height: 50px;
}

button {
    padding: 12px 20px;
    background-color: #282929;
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    margin-left: 10px;
    font-size: 26px;
    font-weight: bold;
}

button:hover {
    background-color: #474646;
}


.user-message, .bot-message {
    margin: 10px 0;
    padding: 12px;
    border-radius: 8px;
    max-width: 95%;
    font-size: 26px;
}

.user-message {
    background: #474646;
    color: white;
    align-self: flex-end;
    text-align: right;
}

.bot-message {
    background: #3a3b3c;
    color: white;
    align-self: flex-start;
}


.chat-box::-webkit-scrollbar {
    width: 6px;
}

.chat-box::-webkit-scrollbar-thumb {
    background: #555;
    border-radius: 20px;
}

.chat-box::-webkit-scrollbar-track {
    background: #232323;
}

    </style>
</head>
<body>
<nav div class="navbar">
    <h1>WeatherWorm</h1>
</nav>
    <div class="chat-container">
        <div class="chat-box" id="chatBox">
            <div class="bot-message">Hello! Enter your district to get crop recommendations. 🌱</div>
        </div>
        <div class="input-container">
            <input type="text" id="districtInput" placeholder="Enter your district..." />
            <button onclick="getCrops()">Send</button>
        </div>
    </div>
<script>
    async function getCrops() {
        const districtInput = document.getElementById("districtInput");
        const district = districtInput.value.trim();
        if (!district) return;
    
        const chatBox = document.getElementById("chatBox");
    
        // Display user message
        const userMessage = document.createElement("div");
        userMessage.className = "user-message";
        userMessage.textContent = district;
        chatBox.appendChild(userMessage);
    
    
        try {
            const response = await fetch(`http://localhost:8080/api/crops/district/${district}`);
            if (!response.ok) throw new Error(`Server Error: ${response.status}`);
    
            const crops = await response.json();
            const cropName = crops.length > 0 ? crops[0].cropName : null;
    
            // Display bot message
            displayBotMessage(
                cropName
                    ? `🌿 Recommended Crop: <b><span style="color: red;">${cropName}</span></b>. Good weather conditions to plant <b>${cropName}</b>. You will have more <span style="color: green;">profit</span> from planting this crop.`
                    : "⚠️ No suitable crops found."
            );
        } catch (error) {
            console.error("Error fetching crops:", error);
            displayBotMessage(`❌ Error fetching crops: ${error.message}`);
        }
    
        resetInput(districtInput);
    }
    
    // Utility function to display bot messages
    function displayBotMessage(message) {
        const chatBox = document.getElementById("chatBox");
        const botMessage = document.createElement("div");
        botMessage.className = "bot-message";
        botMessage.innerHTML = message;
        chatBox.appendChild(botMessage);
        chatBox.scrollTop = chatBox.scrollHeight;
    }
    
    // Utility function to reset input
    function resetInput(inputElement) {
        inputElement.value = "";
    }
    
    // Attach Enter key event to input field
    document.getElementById("districtInput").addEventListener("keypress", (event) => {
        if (event.key === "Enter") {
            getCrops();
        }
    });
</script>
</body>
</html>
